# Docker-Compose fuer Verinaris — Backend + Frontend + Persistenz
#
# Start:    docker compose up -d
# Logs:     docker compose logs -f
# Stop:     docker compose down
# Rebuild:  docker compose up --build -d
#
# Zugriff nach Start:
#   Backend:  http://localhost:8000
#   Frontend: http://localhost:8501

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verinaris-backend
    ports:
      # Nur lokal: von aussen erreichbar ausschliesslich ueber Caddy.
      # Ohne 127.0.0.1 umgeht Docker die ufw-Regeln und oeffnet den Port weltweit.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Ollama laeuft auf dem Mac-Host, nicht im Container
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    extra_hosts:
      # Damit Container den Mac-Host als 'host.docker.internal' aufloesen kann
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - verinaris-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: verinaris-frontend
    ports:
      # Nur lokal: Caddy erreicht das Frontend ueber das Docker-Netz.
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    environment:
      # Streamlit ruft Backend intern ueber Docker-Netzwerk auf
      - BACKEND_URL=http://backend:8000
      # Segfaults liefern damit einen Python-Stack statt stummem exit 139
      - PYTHONFAULTHANDLER=1
    volumes:
      - ./data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - verinaris-net

  caddy:
    image: caddy:2-alpine
    container_name: verinaris-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # WICHTIG: haelt die Let's-Encrypt-Zertifikate. Ohne dieses Volume
      # holt Caddy nach jedem Rebuild ein neues -- Limit sind 5 pro Woche.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - verinaris-net

networks:
  verinaris-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
